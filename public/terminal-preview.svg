<svg xmlns="http://www.w3.org/2000/svg" width="520" height="230" viewBox="0 0 520 230">
  <defs>
    <style>
      @keyframes scene1 {
        0%, 2% { opacity: 0; }
        3%, 23% { opacity: 1; }
        25%, 100% { opacity: 0; }
      }
      @keyframes scene2 {
        0%, 27% { opacity: 0; }
        28%, 48% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
      @keyframes scene3 {
        0%, 52% { opacity: 0; }
        53%, 73% { opacity: 1; }
        75%, 100% { opacity: 0; }
      }
      @keyframes scene4 {
        0%, 77% { opacity: 0; }
        78%, 98% { opacity: 1; }
        100% { opacity: 0; }
      }
      .s1 { animation: scene1 20s infinite; opacity: 0; }
      .s2 { animation: scene2 20s infinite; opacity: 0; }
      .s3 { animation: scene3 20s infinite; opacity: 0; }
      .s4 { animation: scene4 20s infinite; opacity: 0; }
      text { font-family: Consolas, 'Courier New', monospace; font-size: 12px; }
      .prompt { fill: #fbbf24; }
      .cmd { fill: #e0e6f0; }
      .green { fill: #4ade80; }
      .cyan { fill: #22d3ee; }
      .dim { fill: #64748b; }
      .amber { fill: #fbbf24; }
      .title-text { fill: #64748b; font-size: 12px; }
    </style>
  </defs>

  <!-- Window frame -->
  <rect x="0.5" y="0.5" width="519" height="229" rx="10" ry="10" fill="#080c16" stroke="rgba(99,102,241,0.15)" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="1" y="1" width="518" height="30" rx="10" ry="10" fill="#0f1629"/>
  <rect x="1" y="21" width="518" height="10" fill="#0f1629"/>

  <!-- Traffic light dots -->
  <circle cx="18" cy="16" r="5.5" fill="#f87171"/>
  <circle cx="34" cy="16" r="5.5" fill="#fbbf24"/>
  <circle cx="50" cy="16" r="5.5" fill="#4ade80"/>

  <!-- Title -->
  <text x="260" y="19.5" text-anchor="middle" class="title-text">arr-barr</text>

  <!-- Scene 1: arr health -->
  <g class="s1">
    <text x="14" y="52"><tspan class="prompt">$ </tspan><tspan class="cmd">arr health</tspan></text>
    <text x="14" y="72"><tspan class="green">&#x25cf; gluetun</tspan><tspan class="dim"> ............ </tspan><tspan class="green">tunnel up</tspan><tspan class="dim">        23ms</tspan></text>
    <text x="14" y="88"><tspan class="green">&#x25cf; transmission</tspan><tspan class="dim"> ........ </tspan><tspan class="green">healthy</tspan><tspan class="dim">          41ms</tspan></text>
    <text x="14" y="104"><tspan class="green">&#x25cf; sabnzbd</tspan><tspan class="dim"> ............ </tspan><tspan class="green">healthy</tspan><tspan class="dim">          38ms</tspan></text>
    <text x="14" y="120"><tspan class="green">&#x25cf; radarr</tspan><tspan class="dim"> ............. </tspan><tspan class="green">healthy</tspan><tspan class="dim">          52ms</tspan></text>
    <text x="14" y="136"><tspan class="green">&#x25cf; sonarr</tspan><tspan class="dim"> ............. </tspan><tspan class="green">healthy</tspan><tspan class="dim">          47ms</tspan></text>
    <text x="14" y="152"><tspan class="green">&#x25cf; lidarr</tspan><tspan class="dim"> ............. </tspan><tspan class="green">healthy</tspan><tspan class="dim">          44ms</tspan></text>
    <text x="14" y="168"><tspan class="green">&#x25cf; jellyfin</tspan><tspan class="dim"> ........... </tspan><tspan class="green">healthy</tspan><tspan class="dim">          31ms</tspan></text>
    <text x="14" y="196"><tspan class="cmd">15/15 crew members reporting</tspan><tspan class="green">         all systems nominal</tspan></text>
  </g>

  <!-- Scene 2: arr vpn -->
  <g class="s2">
    <text x="14" y="52"><tspan class="prompt">$ </tspan><tspan class="cmd">arr vpn</tspan></text>
    <text x="14" y="72"><tspan class="green">&#x25cf; </tspan><tspan class="cyan">Tunnel</tspan><tspan class="dim"> ..................... </tspan><tspan class="green">connected</tspan></text>
    <text x="14" y="88"><tspan class="dim">  Protocol ................... </tspan><tspan class="cmd">WireGuard</tspan></text>
    <text x="14" y="104"><tspan class="dim">  Public IP .................. </tspan><tspan class="cyan">VPN endpoint</tspan></text>
    <text x="14" y="120"><tspan class="dim">  Location ................... </tspan><tspan class="cmd">Netherlands</tspan></text>
    <text x="14" y="136"><tspan class="dim">  Kill switch ................ </tspan><tspan class="green">active</tspan></text>
    <text x="14" y="152"><tspan class="dim">  DNS ........................ </tspan><tspan class="green">encrypted</tspan></text>
    <text x="14" y="180"><tspan class="cmd">All download traffic routed through encrypted tunnel</tspan></text>
  </g>

  <!-- Scene 3: requesting -->
  <g class="s3">
    <text x="14" y="52"><tspan class="prompt">$ </tspan><tspan class="cmd">requesting </tspan><tspan class="amber">"Galactic Plumber 3 (2024)"</tspan></text>
    <text x="14" y="72"><tspan class="cmd">Radarr searching 12 indexers across 4 usenet + 8 torrent...</tspan></text>
    <text x="14" y="88"><tspan class="cmd">found 47 results &#x2014; scoring against 48 custom formats...</tspan></text>
    <text x="14" y="108"><tspan class="green">&#x2713; </tspan><tspan class="cmd">Galactic.Plumber.3.2024.2160p.IMAX.WEB-DL.DV.HDR.Atmos-FLUX</tspan></text>
    <text x="14" y="124"><tspan class="green">  +1700 WEB Tier 01 &#xb7; +800 IMAX &#xb7; +500 HDR &#xb7; +75 Streaming</tspan></text>
    <text x="14" y="140"><tspan class="green">  Score: 3075</tspan><tspan class="dim"> &#x2014; grabbing via tunnel ............ </tspan><tspan class="green">encrypted</tspan></text>
    <text x="14" y="160"><tspan class="cmd">hardlinked to library (0 extra bytes) &#xb7; Jellyfin updated &#xb7; subs queued</tspan></text>
    <text x="14" y="180"><tspan class="green">&#x25cf; Ready to watch</tspan><tspan class="cyan">                            4K Dolby Vision</tspan></text>
  </g>

  <!-- Scene 4: arr downloads -->
  <g class="s4">
    <text x="14" y="52"><tspan class="prompt">$ </tspan><tspan class="cmd">arr downloads --once</tspan></text>
    <text x="14" y="72"><tspan class="cyan">&#x25bc; Downloading</tspan><tspan class="dim"> ...................................... </tspan><tspan class="cmd">2 active</tspan></text>
    <text x="14" y="88"><tspan class="dim">  Wizard.Cops.1992.UHD.BluRay.REMUX.DTS-HD.MA</tspan><tspan class="cmd"> &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x258a;&#x2591;&#x2591; </tspan><tspan class="green">87%</tspan><tspan class="dim"> 42MB/s</tspan></text>
    <text x="14" y="104"><tspan class="dim">  Sock.Drawer.S03.1080p.WEB-DL.Atmos</tspan><tspan class="cmd"> &#x2588;&#x2588;&#x2588;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591;&#x2591; </tspan><tspan class="amber">34%</tspan><tspan class="dim"> 28MB/s</tspan></text>
    <text x="14" y="120"><tspan class="dim">  Beep.Boop.2017.FLAC.CD-DeVOiD</tspan><tspan class="cmd"> &#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2588;&#x2591; </tspan><tspan class="green">95%</tspan><tspan class="dim"> 11MB/s</tspan></text>
    <text x="14" y="148"><tspan class="cyan">&#x25b2; Seeding</tspan><tspan class="dim"> ......................................... </tspan><tspan class="cmd">12 active</tspan></text>
    <text x="14" y="164"><tspan class="dim">  ratio 2.4 &#xb7; uploaded 847 GB &#xb7; tunnel </tspan><tspan class="green">&#x25cf; up</tspan><tspan class="dim"> &#xb7; 70 MB/s</tspan></text>
  </g>
</svg>